    <style>

            background: #000;
        }

        .video-frame-wrap iframe {

            inset: 0;
            width: 100%;

        }

        .countdown-item {

        .menu-wrap {
            margin: 0;
            position: absolute;
            top: 1rem;

        .menu-button {

            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 10px 25px rgba(30, 58, 138, 0.35);
            transition: transform 120ms ease, box-shadow 120ms ease;
        }

        .menu-line {
            width: 100%;
            height: 3px;
            border-radius: 999px;
            background: #fff;
            display: block;
        }

        .menu-button:hover {
            transform: translateY(-1px);
            box-shadow: 0 14px 30px rgba(30, 58, 138, 0.45);
        }

        .menu-list {
            list-style: none;
            margin: 10px 0 0;
            padding: 8px;
            border-radius: 14px;
            background: #fff;
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.2);

            text-align: left;

<body>

    <div class="container">

        <h2>20 juli 2026</h2>

        <div class="countdown-container" id="countdown">
            <div class="countdown-item"><span class="countdown-number" id="days">00</span><span
                    class="countdown-label">Dagar</span></div>
            <div class="countdown-item"><span class="countdown-number" id="hours">00</span><span
                    class="countdown-label">Tim</span></div>
            <div class="countdown-item"><span class="countdown-number" id="minutes">00</span><span
                    class="countdown-label">Min</span></div>
            <div class="countdown-item"><span class="countdown-number" id="seconds">00</span><span
                    class="countdown-label">Sek</span></div>
        </div>

        <section class="video-section" aria-label="Bärsaloppet video">
            <h2 class="video-title">Bärsaloppet på YouTube</h2>
            <div class="video-frame-wrap">
                <iframe src="https://www.youtube.com/embed/j3Ydgz6yt6E"
                title="Bärsaloppet video"
                loading="lazy"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                referrerpolicy="strict-origin-when-cross-origin"
                allowfullscreen>
            </iframe>
            </div>
        </section>

        <div class="menu-wrap">
            <button class="menu-button" id="menuButton" type="button" aria-haspopup="true" aria-expanded="false"
                aria-label="Open menu">
                <span class="menu-line"></span>
                <span class="menu-line"></span>
                <span class="menu-line"></span>
            </button>
            <ul class="menu-list" id="menuList" hidden>

                <li><a href="/map.html">Tävlingskarta</a></li>
                <li><a href="/rules.html">Regler</a></li>
                <li><a href="/about-us.html">About us</a></li>
            </ul>

            <div class="sponsor-grid">
                <!--<span>💍 SAGAN I RINGEN</span>
                <span>🃏 GANG WEED</span>
                <span>☁️ PABLO ESCOBAR</span>
                <span>🎮 NYA FREEDOM SERVER 1769</span>
                <span>🐶 SIR REGEN</span> -->
                <span>TBD</span>
                <!--<span>TBD</span>
                <span>TBD</span>
                <span>TBD</span>
                <span>TBD</span>-->
            </div>
            <div class="copyright">© 2026 Bärsaloppet.</div>
        </footer>
    </div>

    <script>
        const targetDate = new Date("July 20, 2026 10:00:00").getTime();
        const elDays = document.getElementById("days"),
            elHours = document.getElementById("hours"),
            elMin = document.getElementById("minutes"),
            elSec = document.getElementById("seconds"),
            elContainer = document.getElementById("countdown");
        const menuButton = document.getElementById("menuButton");
        const menuList = document.getElementById("menuList");

        menuButton.addEventListener("click", () => {
            const isHidden = menuList.hasAttribute("hidden");
            if (isHidden) {
                menuList.removeAttribute("hidden");
                menuButton.setAttribute("aria-expanded", "true");
            } else {
                menuList.setAttribute("hidden", "");
                menuButton.setAttribute("aria-expanded", "false");
            }
        });

        document.addEventListener("click", (event) => {
            if (!event.target.closest(".menu-wrap")) {
                menuList.setAttribute("hidden", "");
                menuButton.setAttribute("aria-expanded", "false");
            }
        });

        const updateTimer = setInterval(() => {
            const diff = targetDate - new Date().getTime();
            if (diff < 0) {
                clearInterval(updateTimer);
                elContainer.textContent = "LOPPET HAR STARTAT!";
                return;
            }
            elDays.textContent = Math.floor(diff / 86400000);
            elHours.textContent = Math.floor((diff % 86400000) / 3600000);
            elMin.textContent = Math.floor((diff % 3600000) / 60000);
            elSec.textContent = Math.floor((diff % 60000) / 1000);
        }, 1000);
    </script>
